services:
  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-18}
    container_name: inventory-postgres
    environment:
      POSTGRES_DB: inventorydb
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_password
    ports:
      - "5432:5432"
    volumes:
      - inventory_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user -d inventorydb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  inventory-api:
    container_name: inventory-api
    build:
      context: .
      dockerfile: src/InventoryService.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__InventoryDatabase: Host=postgres;Port=5432;Database=inventorydb;Username=inventory_user;Password=inventory_password
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  inventory_postgres_data: